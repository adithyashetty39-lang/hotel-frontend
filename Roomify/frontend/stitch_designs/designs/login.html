<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Organic Concierge - Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#161d1c",
                        "inverse-primary": "#91d78a",
                        "on-tertiary-container": "#a7b4a9",
                        "inverse-surface": "#2b3231",
                        "surface-dim": "#d4dbda",
                        "primary": "#003608",
                        "secondary-fixed": "#9bf3df",
                        "outline-variant": "#bfc9c4",
                        "on-surface": "#161d1c",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#017162",
                        "surface-variant": "#dde4e2",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#acf4a4",
                        "tertiary": "#253028",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-container": "#064f13",
                        "surface-container": "#e8efed",
                        "on-tertiary-fixed": "#131e17",
                        "surface-container-high": "#e3eae8",
                        "secondary-fixed-dim": "#7fd6c3",
                        "secondary-container": "#9bf3df",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#3f4945",
                        "primary-fixed-dim": "#91d78a",
                        "on-secondary-fixed": "#00201b",
                        "outline": "#707975",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#3e4a41",
                        "tertiary-container": "#3b463e",
                        "surface-tint": "#2a6b2c",
                        "inverse-on-surface": "#ebf2f0",
                        "tertiary-fixed-dim": "#bdcabe",
                        "secondary": "#006b5c",
                        "on-secondary-fixed-variant": "#005045",
                        "on-primary-fixed-variant": "#0c5216",
                        "error": "#ba1a1a",
                        "on-primary-container": "#7cc176",
                        "tertiary-fixed": "#d9e6da",
                        "background": "#f4fbf9",
                        "surface-container-highest": "#dde4e2",
                        "on-primary-fixed": "#002203",
                        "surface": "#f4fbf9",
                        "surface-bright": "#f4fbf9",
                        "surface-container-low": "#eef5f3"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .glass-panel {
            backdrop-filter: blur(40px);
            background: rgba(244, 251, 249, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .organic-glow:focus-within {
            box-shadow: 0 0 20px rgba(155, 243, 223, 0.4);
        }
        .floating-label-input:focus ~ label,
        .floating-label-input:not(:placeholder-shown) ~ label {
            transform: translateY(-1.25rem) scale(0.85);
            color: #006b5c;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex items-center justify-center p-6">
<!-- Layer 0: Full-bleed landscape background -->
<div class="absolute inset-0 z-0">
<img alt="Lush forest landscape" class="w-full h-full object-cover scale-105" data-alt="Ultra-wide shot of a sun-drenched ancient forest with towering trees, morning mist, and golden light filtering through emerald leaves" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDtrEPgowv4n6VHz2AUOdHXtPvWW2gLKaXxj3Na2AWCsUvgviLQst-FHDrJtnNAkLB5mNEc76y9b12yc5pW9g_5RnBQb8F75yA9lgcgglFVCZ2nv8OMbaGoD6HKdUtN_AE_qCIzAq1dDufYCuOat5x-UeVNprIHoDTz57xbcy2YsgmSEKZ2MJ0mYZwf-B-VSYlesVR3-npPPKqDsxkEzglu21mTaCGtPH0tpQol_iqoPjpUTrv8rBXVv6dDbGQQwHPd1EBmUGT7JjA"/>
<div class="absolute inset-0 bg-primary/20 mix-blend-multiply"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md relative z-10">
<!-- Header / Logo Area -->
<div class="flex flex-col items-center mb-10 space-y-2">
<div class="w-16 h-16 bg-white/20 backdrop-blur-xl rounded-lg flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-white text-4xl" data-icon="spa">spa</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-white drop-shadow-md">
                Organic Concierge
            </h1>
<p class="text-white/80 font-medium tracking-wide">Grow Smart. Trade Fresh.</p>
</div>
<!-- Central Element: Asymmetrical Glass Panel -->
<div class="glass-panel rounded-lg p-10 pb-12 shadow-2xl relative overflow-hidden transform -rotate-1 md:rotate-0">
<!-- Decorative organic bloom inside glass -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-secondary/10 rounded-full blur-3xl"></div>
<div class="relative z-10">
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold text-primary">Welcome Back</h2>
<p class="text-on-surface-variant/70 text-sm mt-1">Please enter your credentials to access the living canvas.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="relative organic-glow rounded-lg bg-surface/50 transition-all duration-300">
<input class="floating-label-input block w-full px-6 pt-7 pb-2 bg-transparent border-0 rounded-lg text-primary focus:ring-0 peer transition-all" id="email" placeholder=" " type="email"/>
<label class="absolute text-on-surface-variant/60 duration-300 transform -translate-y-1/2 top-1/2 left-6 z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-focus:scale-85 peer-focus:-translate-y-5 pointer-events-none" for="email">
                            Email Address
                        </label>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-primary/30" data-icon="mail">mail</span>
</div>
<!-- Password Field -->
<div class="relative organic-glow rounded-lg bg-surface/50 transition-all duration-300">
<input class="floating-label-input block w-full px-6 pt-7 pb-2 bg-transparent border-0 rounded-lg text-primary focus:ring-0 peer transition-all" id="password" placeholder=" " type="password"/>
<label class="absolute text-on-surface-variant/60 duration-300 transform -translate-y-1/2 top-1/2 left-6 z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-focus:scale-85 peer-focus:-translate-y-5 pointer-events-none" for="password">
                            Password
                        </label>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-primary/30" data-icon="lock">lock</span>
</div>
<div class="flex justify-end">
<a class="text-xs font-semibold text-secondary hover:text-primary transition-colors duration-300" href="#">Forgot Password?</a>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-headline py-4 rounded-full shadow-[0_10px_30px_-10px_rgba(0,54,8,0.5)] transition-all duration-500 transform hover:scale-[1.02] active:scale-95 flex items-center justify-center space-x-2 group" type="submit">
<span class="text-lg font-bold tracking-wide">Enter the Ecosystem</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant/60 text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-secondary/30 transition-all" href="#">Create an account</a>
</p>
</div>
</div>
</div>
<!-- Subtle Ambient Footer -->
<div class="mt-8 flex justify-center space-x-6 opacity-60">
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-xs text-white" data-icon="shield">shield</span>
<span class="text-[10px] text-white font-medium uppercase tracking-widest">Secure Access</span>
</div>
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-xs text-white" data-icon="public">public</span>
<span class="text-[10px] text-white font-medium uppercase tracking-widest">Global Concierge</span>
</div>
</div>
</main>
<!-- Visual Polish: Floating dust/pollen effect simulated by subtle blurred divs -->
<div class="absolute top-1/4 left-10 w-2 h-2 bg-secondary/40 rounded-full blur-sm z-0"></div>
<div class="absolute bottom-1/3 right-20 w-3 h-3 bg-white/30 rounded-full blur-md z-0"></div>
<div class="absolute top-1/2 left-1/4 w-1 h-1 bg-primary-fixed/50 rounded-full z-0"></div>
</body></html>
